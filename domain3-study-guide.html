const SC={
'3.1':{
  keyInsight:"CLAUDE.md has a 4-level hierarchy: Managed Policy > User > Project > Directory. User-level is personal only (NOT shared via git). @import keeps files modular. .claude/rules/ is the alternative to monolithic CLAUDE.md.",
  concepts:[
    {tag:'CORE',color:'var(--accent)',title:'Configuration Hierarchy',content:`4-LEVEL HIERARCHY (higher = more authority):\n\n1. MANAGED POLICY (highest priority)\n   /Library/.../ClaudeCode/CLAUDE.md\n   → Org-wide, cannot be excluded by users\n\n2. USER LEVEL\n   ~/.claude/CLAUDE.md\n   → Personal prefs, all projects\n   → NOT shared via version control!\n   → NOT visible to teammates!\n\n3. PROJECT LEVEL\n   ./CLAUDE.md or ./.claude/CLAUDE.md\n   → Team-shared, version controlled\n   → Where team standards go\n\n4. DIRECTORY LEVEL\n   ./src/CLAUDE.md, ./api/CLAUDE.md\n   → Loads on-demand when Claude reads\n     files in that directory (lazy loading)\n\nEXAM TRAP: New team member not getting instructions?\n→ Check if instructions are in ~/.claude/CLAUDE.md\n   (user-level = personal only, not shared)`},
    {tag:'EXAM',color:'var(--red)',title:'@import Syntax & Modular Organization',content:`@import KEEPS CLAUDE.md UNDER 200 LINES:\n\n# In your CLAUDE.md:\nSee @README for project overview.\nGit workflow: @docs/git-instructions.md\nPersonal: @~/.claude/my-project-prefs.md\n\nIMPORT RULES:\n• Relative paths resolve from importing file\n• Absolute paths and ~ paths supported\n• Recursive imports up to 5 hops deep\n• First-time external imports trigger approval\n• Imports load EAGERLY at launch (expanded inline)\n\n@import vs .claude/rules/:\n• @import → loads eagerly, expanded inline\n• .claude/rules/ → can be path-scoped,\n  loads conditionally\n\nUse @import for: shared references, READMEs\nUse rules for: file-type-specific conventions`},
    {tag:'PATTERN',color:'var(--green)',title:'.claude/rules/ as Alternative',content:`SPLITTING MONOLITHIC CLAUDE.md:\n\nInstead of one huge file, use:\n  .claude/rules/testing.md\n  .claude/rules/api-conventions.md\n  .claude/rules/deployment.md\n  .claude/rules/code-style.md\n\nRules WITHOUT paths frontmatter load\nunconditionally (same as .claude/CLAUDE.md).\n\nRules WITH paths frontmatter load only\nwhen Claude reads matching files.\n\nDIAGNOSTICS:\n• /memory → view which files are loaded\n• Use to diagnose inconsistent behavior\n• CLAUDE.md survives /compact (re-read from disk)\n• Auto memory stored in:\n  ~/.claude/projects/<project>/memory/MEMORY.md\n• First 200 lines loaded per session`},
  ]
},
'3.2':{
  keyInsight:"Commands and Skills are now unified. .claude/commands/ and .claude/skills/ both create slash commands. Skills add: context:fork for isolation, allowed-tools for restriction, and supporting files.",
  concepts:[
    {tag:'CORE',color:'var(--purple)',title:'Commands & Skills — Unified System',content:`TWO SCOPES:\n• .claude/commands/ or .claude/skills/\n  → Project-scoped, shared via git\n• ~/.claude/commands/ or ~/.claude/skills/\n  → User-scoped, personal only\n\nProject commands OVERRIDE personal commands\nwith the same name.\n\nFILE → COMMAND NAME:\n  deploy.md → /deploy\n  review-code.md → /review-code\n\nARGUMENTS:\n  $ARGUMENTS → all args as string\n  $ARGUMENTS[0] or $0 → first arg\n  $ARGUMENTS[1] or $1 → second arg\n\nSKILLS vs CLAUDE.md:\n• Skills = on-demand invocation for\n  task-specific workflows\n• CLAUDE.md = always-loaded universal\n  standards`},
    {tag:'EXAM',color:'var(--red)',title:'Skill Frontmatter — context:fork',content:`KEY FRONTMATTER OPTIONS:\n\n---\nname: deep-research\ndescription: Research a topic thoroughly\nargument-hint: [topic]\ncontext: fork\nagent: Explore\nallowed-tools: Read, Grep, Glob\ndisable-model-invocation: true\n---\n\ncontext: fork → CRITICAL FOR EXAM:\n• Runs skill in ISOLATED sub-agent context\n• Prevents verbose output from polluting\n  main conversation\n• Use for: codebase analysis, brainstorming,\n  exploration, anything verbose\n\nallowed-tools → Restrict tool access:\n• Limit to file writes to prevent destruction\n• Scope to read-only for safe analysis\n\nargument-hint → Prompts user for params\nwhen they invoke without arguments\n\ndisable-model-invocation: true\n→ Claude can't auto-trigger (deploy, commit)`},
    {tag:'PATTERN',color:'var(--accent2)',title:'Personal Customization',content:`PERSONAL VARIANTS:\n• Create in ~/.claude/skills/ with DIFFERENT\n  names to avoid overriding team skills\n• Example: team has /review, you create\n  /my-review with personal tweaks\n\nDYNAMIC CONTENT:\n  !command! → shell injection in skill\n  @file → file reference inclusion\n  \${CLAUDE_SESSION_ID} → session ID\n  \${CLAUDE_SKILL_DIR} → skill directory\n\nSKILL DESCRIPTION BUDGET:\n• 2% of context window for all descriptions\n• Claude sees descriptions to know what's\n  available, but full content loads only\n  when invoked\n\nSKILLS ARE AUTO-DISCOVERABLE:\nClaude can invoke skills automatically when\nrelevant (unless disable-model-invocation).`},
  ]
},
'3.3':{
  keyInsight:"Path-specific rules in .claude/rules/ use YAML frontmatter with paths: glob patterns. Rules load ONLY when editing matching files — saving tokens. Better than directory CLAUDE.md for cross-directory conventions.",
  concepts:[
    {tag:'CORE',color:'var(--cyan)',title:'Path-Scoped Rules — Sample Q6 Pattern',content:`CREATE .claude/rules/testing.md:\n---\npaths:\n  - "**/*.test.tsx"\n  - "**/*.test.ts"\n  - "**/*.spec.ts"\n---\n\n# Testing Conventions\n- Use React Testing Library\n- Test behavior, not implementation\n- Mock external services only\n\nTHIS LOADS ONLY when Claude edits\nfiles matching these patterns.\n\nWHY BETTER THAN DIRECTORY CLAUDE.md:\nTest files spread throughout codebase:\n  src/auth/Login.test.tsx\n  src/api/orders.test.ts\n  components/Button.test.tsx\n\nDirectory CLAUDE.md can't cover files\nspread across many directories.\nGlob patterns (**/*.test.tsx) can!`},
    {tag:'EXAM',color:'var(--red)',title:'Sample Q6 — Exact Pattern',content:`SCENARIO: Codebase has:\n• React components (functional + hooks)\n• API handlers (async/await)\n• DB models (repository pattern)\n• Test files spread throughout\n\nAll tests should follow same conventions\nregardless of location.\n\nBEST APPROACH?\n✓ A) .claude/rules/ with glob patterns\n  paths: ["**/*.test.tsx"]\n  → Auto-applies based on file paths\n  → Works regardless of directory\n\n✗ B) Root CLAUDE.md with headers\n  → Relies on inference, unreliable\n✗ C) Skills for each code type\n  → Requires manual invocation\n✗ D) Directory CLAUDE.md files\n  → Can't handle files spread across dirs\n\nPRINCIPLE: Path-specific rules for\ncross-directory conventions.`},
  ]
},
'3.4':{
  keyInsight:"Plan mode = complex, multi-file, architectural decisions. Direct execution = simple, well-scoped, clear changes. Plan mode prevents costly rework by analyzing BEFORE committing. Use Explore subagent for verbose discovery.",
  concepts:[
    {tag:'CORE',color:'var(--green)',title:'Plan Mode vs Direct — Decision Matrix',content:`PLAN MODE WHEN:\n✓ Complex multi-step tasks\n✓ Architectural decisions\n✓ Large-scale refactoring (45+ files)\n✓ Multiple valid approaches\n✓ Microservice restructuring\n✓ Library migration\n✓ Need to verify strategy first\n\nDIRECT EXECUTION WHEN:\n✓ Single-file bug fix with clear stack trace\n✓ Adding a date validation conditional\n✓ Simple feature additions\n✓ Well-understood scope\n✓ 90% of routine development\n\nTOGGLE: Shift+Tab (Normal → Auto → Plan)\nCLI: claude --permission-mode plan\nConfig: defaultMode: "plan" in settings.json\nEdit plan: Ctrl+G to open in text editor`},
    {tag:'EXAM',color:'var(--red)',title:'Sample Q5 — Monolith to Microservices',content:`SCENARIO: Restructure monolith to microservices.\nChanges affect dozens of files.\nService boundary decisions needed.\n\n✓ A) Plan mode — explore, understand, design\n  before making changes.\n  → Prevents costly rework\n  → Safe codebase exploration\n\n✗ B) Direct execution incrementally\n  → Risks discovering dependencies late\n✗ C) Direct with upfront instructions\n  → Assumes you know the code already\n✗ D) Direct, switch to plan if complex\n  → Complexity is STATED, not emergent\n\nCOMBINED PATTERN:\n1. Plan mode → investigate + design\n2. Direct execution → implement plan\n\nExample: Plan library migration strategy,\nthen execute the planned approach.`},
    {tag:'PATTERN',color:'var(--accent2)',title:'Explore Subagent',content:`EXPLORE = built-in READ-ONLY subagent:\n• Uses Haiku model (fast, cheap)\n• Write/Edit tools denied\n• Three thoroughness levels:\n  - quick: targeted lookups\n  - medium: balanced exploration\n  - very thorough: comprehensive analysis\n\nKEY BENEFIT: Context isolation\n• Verbose exploration stays in subagent\n• Only summary returns to main session\n• ~30 lines vs ~500+ lines of tool output\n\nWHEN TO USE:\n• Verbose discovery phases\n• Prevent context window exhaustion\n• Multi-phase tasks with exploration first\n\nOTHER BUILT-IN SUBAGENTS:\n• Plan → read-only, inherits model\n• General-purpose → all tools, inherits model\n\nNO NESTING: Subagents cannot spawn\nsub-subagents.`},
  ]
},
'3.5':{
  keyInsight:"Use concrete I/O examples when prose is ambiguous. Test-driven iteration: write tests first, iterate on failures. Interview pattern: Claude asks questions to surface unconsidered issues. Fix interacting problems together, independent ones sequentially.",
  concepts:[
    {tag:'CORE',color:'var(--orange)',title:'Iterative Refinement Techniques',content:`4 TECHNIQUES:\n\n1. CONCRETE INPUT/OUTPUT EXAMPLES\n   When prose descriptions produce inconsistent\n   results, provide 2-3 concrete examples:\n   "Input: '2024-03-15' → Output: 'March 15, 2024'"\n   Most effective way to communicate intent.\n\n2. TEST-DRIVEN ITERATION (Red-Green-Refactor)\n   1. Write failing tests first\n   2. Share test failures with Claude\n   3. Claude writes minimal code to pass\n   4. Refactor while keeping tests green\n\n3. INTERVIEW PATTERN\n   Claude asks questions BEFORE implementing:\n   → "What cache invalidation strategy?"\n   → "How to handle failure modes?"\n   Surfaces considerations you didn't anticipate.\n\n4. ISSUE BATCHING:\n   • Interacting problems → fix ALL in one message\n     (fixes may conflict if done separately)\n   • Independent problems → fix sequentially\n     (each fix is self-contained)`},
    {tag:'PATTERN',color:'var(--yellow)',title:'Automated Test Loop',content:`AUTOMATED TDD LOOP:\n\nwhile ! npm test; do\n  claude -p "Fix the failing tests: $(npm test 2>&1)"\ndone\n\nFeed test failures back to Claude iteratively\nuntil all tests pass.\n\nENFORCE WITH HOOKS:\nPreToolUse hooks can verify test existence\nbefore allowing feature code.\n\nMULTI-AGENT TDD:\nIsolate phases into separate contexts:\n• Subagent 1: write tests\n• Subagent 2: implement code\n• Subagent 3: refactor\nPrevents "context pollution" between phases.\n\nBEST PRACTICES:\n• Provide specific test cases with input/output\n• Include edge cases (null values, empty arrays)\n• Performance requirements in tests\n• Share 2-3 examples of expected transformations`},
  ]
},
'3.6':{
  keyInsight:"Use -p (--print) for non-interactive CI/CD. --output-format json for structured output. Include prior review findings to avoid duplicates. Use independent review instances (not self-review) for better results.",
  concepts:[
    {tag:'CORE',color:'var(--red)',title:'CI/CD Integration — -p Flag',content:`THE -p FLAG (Sample Q10 pattern):\n\nclaude -p "Analyze this PR for security issues"\n→ Non-interactive mode\n→ Processes prompt, outputs to stdout, exits\n→ No TUI, no interactive input\n\nSTRUCTURED OUTPUT:\nclaude -p "Review code" --output-format json\n→ Returns: result, usage, total_cost_usd, duration_ms\n\nJSON SCHEMA ENFORCEMENT:\nclaude -p "..." --json-schema '{...}'\n→ Machine-parseable for automated PR comments\n\nPIPE-BASED WORKFLOWS:\ngit diff | claude -p "Review this diff"\ncat build-error.txt | claude -p "Explain root cause"\n\nPLAN MODE IN CI:\nclaude --permission-mode plan -p "Analyze auth"\n→ Read-only analysis, no changes made`},
    {tag:'EXAM',color:'var(--red)',title:'Self-Review Limitations & Best Practices',content:`SELF-REVIEW IS WEAK:\n• Model retains reasoning context from generation\n• Less likely to question its own decisions\n• Same session = biased review\n\nSOLUTION: Independent review instance\n• Separate Claude session WITHOUT prior context\n• More effective at catching subtle issues\n\nAVOID DUPLICATE COMMENTS:\n• Include prior review findings when re-running\n• Instruct: "Report only NEW or unaddressed issues"\n\nTEST GENERATION BEST PRACTICES:\n• Provide existing test files in context\n  → Avoids suggesting duplicates\n• Document testing standards in CLAUDE.md:\n  → Valuable test criteria\n  → Available fixtures\n  → Convention patterns\n\nCLAUDE.MD FOR CI:\nAll project context (testing standards, review\ncriteria) should be in CLAUDE.md so CI-invoked\nClaude Code has access to it.`},
  ]
}
};
