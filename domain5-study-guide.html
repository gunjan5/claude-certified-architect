const SC={
'5.1':{keyInsight:"Context is a finite, degrading resource. Trim verbose tool outputs BEFORE they accumulate. Place key findings at START of aggregated inputs. Extract transactional facts into a persistent 'case facts' block outside summarized history.",
  concepts:[
    {tag:'CORE',color:'var(--cyan)',title:'Context Window Management Strategies',content:`THREE CRITICAL PROBLEMS:\n\n1. LOST IN THE MIDDLE (U-shaped attention)\n   Models attend best to START + END of context.\n   >30% accuracy degradation for middle content.\n   → Place key findings at BEGINNING\n   → Use explicit section headers\n\n2. PROGRESSIVE SUMMARIZATION RISKS\n   Condensing "$49.99 refund" into "refund amount"\n   loses the specific value. Numbers, dates,\n   percentages, customer expectations get vague.\n   → Extract facts into persistent "case facts" block\n   → Keep outside summarized history\n\n3. TOOL RESULT ACCUMULATION\n   Order lookup returns 40+ fields.\n   Only 5 are relevant to the current issue.\n   Each accumulates in context, wasting tokens.\n   → Trim to relevant fields BEFORE accumulation\n   → Use PostToolUse hooks for normalization\n\nCRITICAL: Always pass COMPLETE conversation\nhistory in subsequent API requests for coherence.`},
    {tag:'PATTERN',color:'var(--green)',title:'Case Facts Block Pattern',content:`EXTRACT TRANSACTIONAL FACTS into persistent block:\n\n=== CASE FACTS (do not summarize) ===\nCustomer: Alice Chen (CUST-12345)\nOrder: ORD-67890\nOriginal amount: $149.99\nRefund requested: $49.99 (partial)\nDuplicate charge confirmed: Yes\nDate of charge: 2024-03-15\nEscalation threshold: $500\n===================================\n\nThis block is included in EVERY prompt,\nOUTSIDE the summarized conversation history.\n\nFOR MULTI-ISSUE SESSIONS:\nExtract structured issue data:\n{\n  "issues": [\n    {"id": "ISS-1", "type": "billing",\n     "order": "ORD-67890", "amount": "$49.99"},\n    {"id": "ISS-2", "type": "delivery",\n     "tracking": "TRK-111", "status": "delayed"}\n  ]\n}\n→ Separate context layer for each issue`},
    {tag:'EXAM',color:'var(--red)',title:'Subagent Output Optimization',content:`UPSTREAM AGENTS should return STRUCTURED DATA\nnot verbose content when downstream has\nlimited context budget:\n\nBAD (verbose, wastes context):\n"I searched for information about climate change\nand found several sources. The first source from\nNASA discusses rising temperatures..."\n(500+ tokens of reasoning chains)\n\nGOOD (structured, compact):\n{\n  "findings": [\n    {"claim": "Global temp +1.1°C since 1880",\n     "source": "NASA GISS",\n     "date": "2024",\n     "confidence": "high"}\n  ],\n  "coverage_gaps": ["ocean acidification"]\n}\n(50 tokens of key facts)\n\nSubagents MUST include metadata:\n• Dates / publication years\n• Source locations\n• Methodological context\n→ Enables accurate downstream synthesis`},
  ]
},
'5.2':{keyInsight:"Escalate on: explicit customer request, policy gaps, inability to progress, multiple customer matches. NOT on: sentiment, self-reported confidence. Acknowledge frustration while offering resolution.",
  concepts:[
    {tag:'CORE',color:'var(--accent2)',title:'Escalation Triggers — Know All Four',content:`CORRECT ESCALATION TRIGGERS:\n\n1. CUSTOMER EXPLICITLY REQUESTS HUMAN\n   → Honor IMMEDIATELY, no investigation first\n   → Exception: if issue is straightforward,\n     acknowledge frustration + offer resolution.\n     Escalate only if customer reiterates.\n\n2. POLICY GAP\n   → Policy is ambiguous or silent on request\n   → Example: competitor price match when policy\n     only addresses own-site adjustments\n   → Agent can't determine the right action\n\n3. INABILITY TO MAKE PROGRESS\n   → Agent has attempted but can't resolve\n   → Multiple failed approaches\n\n4. MULTIPLE CUSTOMER MATCHES\n   → Tool returns 3 "John Smith" results\n   → Ask for additional identifiers!\n   → Do NOT select based on heuristics\n\nINCORRECT TRIGGERS (exam distractors):\n✗ Sentiment-based ("customer sounds angry")\n✗ Self-reported confidence ("I'm 60% sure")\n✗ Complexity heuristics`},
    {tag:'EXAM',color:'var(--red)',title:'Escalation Calibration — Q3 Pattern',content:`SCENARIO: 55% resolution (target 80%).\nEscalates EASY cases (damage replacements).\nHandles HARD cases (policy exceptions).\n\n✓ A) Explicit criteria + few-shot examples\n  showing when to escalate vs resolve\n  → Fixes unclear decision boundaries\n\n✗ B) Self-reported confidence 1-10\n  → Already incorrectly confident on hard cases\n✗ C) ML classifier on historical tickets\n  → Over-engineered before prompt optimization\n✗ D) Sentiment analysis\n  → Sentiment ≠ case complexity\n\nPRINCIPLE: Try prompt optimization FIRST.\nOnly add ML infrastructure after prompts\nhave been exhausted.\n\nFEW-SHOT ESCALATION EXAMPLES:\n<example>\nIssue: Standard damage replacement with photo\nAction: RESOLVE — within standard policy\n</example>\n<example>\nIssue: Warranty expired but defective product\nAction: ESCALATE — policy gap on post-warranty\n</example>`},
  ]
},
'5.3':{keyInsight:"Return structured error context (failure type, query, partial results, alternatives). NEVER return generic 'search unavailable' or empty results as success. Local recovery first; escalate only unresolvable errors.",
  concepts:[
    {tag:'CORE',color:'var(--orange)',title:'Error Propagation Patterns',content:`STRUCTURED ERROR CONTEXT enables recovery:\n{\n  "error_type": "timeout",\n  "attempted_query": "AI in music production",\n  "partial_results": [\n    {"title": "AI Composition Tools", "url": "..."}\n  ],\n  "alternatives": ["Try narrower query",\n    "Use cached results from prior search"]\n}\n\nTWO ANTI-PATTERNS:\n✗ Generic "search unavailable"\n  → Coordinator can't decide what to do\n✗ Empty results marked as success\n  → Masks the failure entirely\n\nCRITICAL DISTINCTION:\n• Access failure (server down) → error\n  → Needs retry decision\n• Valid empty result (0 matches) → SUCCESS\n  → {"results": [], "status": "success"}\n  → Do NOT mark as error!\n\nLOCAL RECOVERY FIRST:\nSubagents should handle transient errors\nlocally (retry with backoff). Only escalate\nerrors they cannot resolve, along with:\n• What was attempted\n• Partial results obtained\n• Suggested alternatives`},
    {tag:'PATTERN',color:'var(--yellow)',title:'Coverage Annotations',content:`SYNTHESIS OUTPUT should annotate coverage:\n\n{\n  "findings": [\n    {\n      "topic": "AI in music",\n      "coverage": "well-supported",\n      "sources": 5,\n      "confidence": "high"\n    },\n    {\n      "topic": "AI in theater",\n      "coverage": "gap — search timeout",\n      "sources": 0,\n      "confidence": "none",\n      "note": "Web search failed; topic\n        not covered in available sources"\n    }\n  ]\n}\n\nDistinguish:\n• Well-supported findings (multiple sources)\n• Contested findings (conflicting sources)\n• Coverage gaps (unavailable sources)\n\nLet the coordinator decide how to handle\ngaps rather than suppressing them.`},
  ]
},
'5.4':{keyInsight:"Context degrades in long sessions — model references 'typical patterns' instead of specific classes. Use scratchpad files to persist findings OUTSIDE context. Delegate verbose exploration to subagents.",
  concepts:[
    {tag:'CORE',color:'var(--purple)',title:'Context Degradation & Scratchpad Files',content:`PROBLEM: After 30+ turns, Claude starts:\n• Referencing "typical patterns" instead of\n  specific class names discovered earlier\n• Giving inconsistent answers\n• Forgetting file paths and function names\n\nSOLUTION: SCRATCHPAD FILES\n• Persist key findings to filesystem\n• Reference in subsequent prompts\n• OUTSIDE the context window\n• Immune to context degradation\n\nEXAMPLE SCRATCHPAD:\n// findings.md\n## Auth Module Analysis\n- Entry point: src/auth/AuthService.ts\n- JWT handling: src/auth/jwt.ts (line 42 bug)\n- 14 files import AuthService\n- Token expiration: 24h (hardcoded)\n\nREFERENCE IN PROMPTS:\n"Refer to findings.md for the auth module\nanalysis. Focus on the JWT bug on line 42."\n\nWHY NOT ALTERNATIVES:\n✗ Bigger context → doesn't fix "lost in middle"\n✗ New session each phase → loses all prior work\n✗ /compact → helps space but doesn't preserve\n  specific details reliably`},
    {tag:'PATTERN',color:'var(--cyan)',title:'Subagent Delegation & Crash Recovery',content:`SUBAGENT DELEGATION FOR CONTEXT:\n• Spawn subagents for specific questions:\n  "Find all test files"\n  "Trace refund flow dependencies"\n• Verbose output stays in subagent context\n• Only summary returns to main agent\n• Main agent preserves high-level coordination\n\nPHASED EXPLORATION:\n1. Explore phase → key findings summary\n2. Inject summary into next subagent's context\n3. Next phase builds on prior findings\n4. Main agent never fills with verbose output\n\nCRASH RECOVERY PATTERN:\n• Each agent exports state to known location\n  (structured manifest file)\n• Coordinator loads manifest on resume\n• Injects recovered state into agent prompts\n\nManifest example:\n{\n  "phase": "analysis",\n  "completed": ["auth", "payments"],\n  "in_progress": "notifications",\n  "findings_file": "scratchpad/analysis.md",\n  "last_checkpoint": "2024-03-15T10:30:00Z"\n}\n\n/compact: Use during extended exploration\nwhen context fills with verbose discovery.`},
  ]
},
'5.5':{keyInsight:"97% aggregate accuracy can mask 60% accuracy on specific doc types. Use stratified sampling across document types AND fields. Calibrate field-level confidence with labeled validation sets.",
  concepts:[
    {tag:'CORE',color:'var(--green)',title:'Human Review Routing & Confidence',content:`AGGREGATE ACCURACY IS MISLEADING:\n97% overall may hide:\n• 99.5% on invoices\n• 60% on handwritten receipts\n• 95% on contracts\n→ Validate by document type AND field\n  before reducing human review\n\nSTRATIFIED RANDOM SAMPLING:\n• Sample high-confidence extractions\n• Measure actual error rates\n• Detect novel error patterns\n• Don't trust aggregate numbers alone\n\nFIELD-LEVEL CONFIDENCE:\n{\n  "vendor_name": {"value": "Acme", "confidence": 0.98},\n  "total": {"value": "$150", "confidence": 0.92},\n  "tax_id": {"value": null, "confidence": 0.4}\n}\n→ Calibrate thresholds using labeled validation\n→ Route low-confidence fields to human review\n→ Prioritize limited reviewer capacity\n\nDO NOT auto-approve high-confidence until\nyou've validated accuracy per segment.`},
  ]
},
'5.6':{keyInsight:"Source attribution is lost during summarization. Require claim-source mappings. Handle conflicting stats by preserving BOTH with attribution, not selecting one. Include publication dates to avoid temporal confusion.",
  concepts:[
    {tag:'CORE',color:'var(--yellow)',title:'Information Provenance in Synthesis',content:`CLAIM-SOURCE MAPPINGS:\nSubagents output structured attribution:\n{\n  "claim": "AI market will reach $190B by 2025",\n  "source": "Gartner Report Q3 2024",\n  "source_url": "https://...",\n  "excerpt": "...expected to reach $190 billion...",\n  "publication_date": "2024-07-15"\n}\n\nSynthesis agent MUST preserve these mappings\nwhen combining findings from multiple subagents.\n\nCONFLICTING SOURCES:\nSource A says "42% adoption rate"\nSource B says "38% adoption rate"\n\n✗ WRONG: Pick one arbitrarily\n✓ CORRECT: Preserve both with attribution:\n  "Adoption rates vary: 42% (Gartner, 2024)\n   vs 38% (McKinsey, 2023). Difference may\n   reflect different survey methodologies."\n\nTEMPORAL DATA:\n• Include publication/collection dates\n• 2022 data vs 2024 data is not a contradiction\n  — it's temporal change\n• Without dates, temporal differences are\n  misinterpreted as conflicting data`},
    {tag:'PATTERN',color:'var(--cyan)',title:'Report Structure & Content Rendering',content:`DISTINGUISH FINDING QUALITY:\n\n## Well-Established Findings\n(Multiple independent sources, consistent)\n- AI productivity gains: 15-25% (5 sources)\n\n## Contested Findings\n(Conflicting sources, preserve both)\n- Market size: $190B (Gartner) vs $175B (IDC)\n  Methodological difference: ...\n\n## Coverage Gaps\n(Unavailable sources, annotated)\n- AI in theater: insufficient sources found\n  (web search timeout, limited academic coverage)\n\nCONTENT-APPROPRIATE RENDERING:\n• Financial data → tables\n• News/events → prose narrative\n• Technical findings → structured lists\n• Statistics → comparison tables with sources\n\n✗ Don't convert everything to uniform format\n✓ Match rendering to content type`},
  ]
}
};
