const SECTION_CONTENT = {
'1.1': {
  keyInsight: "The agentic loop is controlled ENTIRELY by stop_reason. The model decides when to stop — not your code.",
  concepts: [
    {tag:'CORE',color:'var(--cyan)',title:'stop_reason Values',content:`Every API response includes stop_reason — this is THE loop control signal:\n\n• "tool_use" → Claude wants tools. Execute them, append results, loop.\n• "end_turn" → Claude is DONE. Return final response.\n• "max_tokens" → Output TRUNCATED (not finished). Response is incomplete.\n• "stop_sequence" → Hit your custom stop sequence.\n• "pause_turn" → Server-side iteration limit. NOT terminal — continue!\n\nEXAM TIP: "end_turn" and "tool_use" are the two you'll see most. "pause_turn" is a trap answer — it is NOT terminal.`},
    {tag:'CODE',color:'var(--accent)',title:'Agentic Loop Implementation',content:`import anthropic\nclient = anthropic.Anthropic()\n\ndef run_agent(user_msg, tools, system):\n    messages = [{"role": "user", "content": user_msg}]\n    while True:\n        response = client.messages.create(\n            model="claude-sonnet-4-6", max_tokens=4096,\n            system=system, tools=tools, messages=messages\n        )\n        messages.append({"role":"assistant","content":response.content})\n\n        if response.stop_reason == "end_turn":\n            return response  # Done\n\n        if response.stop_reason == "tool_use":\n            tool_results = []\n            for block in response.content:\n                if block.type == "tool_use":\n                    result = execute_tool(block.name, block.input)\n                    tool_results.append({\n                        "type": "tool_result",\n                        "tool_use_id": block.id,  # MUST match\n                        "content": str(result)\n                    })\n            messages.append({"role":"user","content":tool_results})`},
    {tag:'TRAP',color:'var(--red)',title:'Anti-Patterns (Wrong Answers)',content:`These appear as distractors on the exam:\n\n✗ Parsing text for completion: if "I'm done" in response.text\n   → stop_reason drives the loop, not text content\n\n✗ Iteration caps as primary control: for i in range(5)\n   → max_turns is a SAFETY guardrail, not loop logic\n\n✗ Checking assistant text for signals: if text.endswith("COMPLETE")\n   → Never inspect text to decide loop continuation\n\n✗ Pre-configured decision trees: if "refund" in user_input: call_tool()\n   → Removes Claude's model-driven reasoning\n\n✓ ONLY correct primary control:\n   if response.stop_reason == "end_turn": break`},
    {tag:'API',color:'var(--cyan)',title:'tool_use & tool_result Format',content:`CLAUDE SENDS (tool_use block in assistant message):\n{\n  "type": "tool_use",\n  "id": "toolu_01D7FLrfh4GYq7yT1ULFeyMV",\n  "name": "get_customer",\n  "input": {"customer_email": "alice@example.com"}\n}\n\nYOU SEND BACK (tool_result in user message):\n{\n  "type": "tool_result",\n  "tool_use_id": "toolu_01D7FLrfh4GYq7yT1ULFeyMV",\n  "content": "{\\"name\\": \\"Alice\\", \\"id\\": \\"C-123\\"}" \n}\n\nCRITICAL RULES:\n• tool_use_id in result MUST match the id from tool_use block\n• content MUST be a string — not number, boolean, or raw JSON\n• is_error: true tells Claude the tool call failed\n• tool_result blocks MUST come FIRST in content array\n• Multiple tool_use blocks = parallel calls (execute ALL)`},
  ]
},
'1.2': {
  keyInsight: "Subagents are isolated. They can't talk to each other. ALL communication goes through the coordinator. Missing coverage = coordinator's fault.",
  concepts: [
    {tag:'ARCH',color:'var(--green)',title:'Hub-and-Spoke Architecture',content:`The coordinator (hub) manages all communication:\n\n• Decomposes tasks into subtasks\n• Delegates to specialized subagents (spokes)\n• Aggregates and synthesizes results\n• Handles errors and re-delegation\n\nCRITICAL RULES:\n1. Subagents CANNOT communicate directly\n2. ALL info flows through the coordinator\n3. Each subagent gets a FRESH context\n4. Only the FINAL message returns to coordinator\n5. Intermediate tool calls STAY inside subagent\n6. Coordinator decides what context each gets`},
    {tag:'EXAM',color:'var(--red)',title:'The Decomposition Problem (Q7)',content:`SCENARIO: Research "AI in creative industries"\n→ Output only covers visual arts. Missing music, writing, film.\n→ Coordinator decomposed into: "AI in digital art",\n  "AI in graphic design", "AI in photography"\n\nWHO IS AT FAULT?\n✗ A) Synthesis agent lacks gap detection → wrong\n   (can only work with what it receives)\n✗ C) Web search queries too narrow → wrong\n   (searched exactly what it was assigned)\n✗ D) Doc analysis filtering too aggressively → wrong\n\n✓ B) Coordinator's decomposition is too narrow\n   (only created visual arts subtasks!)\n\nPRINCIPLE: Subagents work correctly within their scope.\nMissing coverage = ALWAYS a coordinator problem.`},
    {tag:'PATTERN',color:'var(--yellow)',title:'Iterative Refinement Loops',content:`The coordinator evaluates and re-delegates:\n\n1. Decompose task into subtopics\n2. Subagents execute (parallel where possible)\n3. Coordinator receives results\n4. Evaluate synthesis for gaps\n   → "Is music covered? Writing? Film?"\n5. If gaps: re-invoke search with targeted queries\n6. Re-run synthesis with enriched findings\n7. Repeat until coverage sufficient\n\nEXAM: "How ensure comprehensive coverage?"\n→ Iterative refinement where coordinator checks\n  output quality and re-delegates to fill gaps`},
    {tag:'API',color:'var(--cyan)',title:'Error Propagation (Q8)',content:`When a subagent fails (e.g., timeout):\n\n✓ Return STRUCTURED error context:\n  - failure type (timeout, auth, rate limit)\n  - attempted query\n  - partial results (if any)\n  - potential alternatives\n\n✗ Generic "search unavailable" → hides context\n✗ Empty result marked as success → masks failure\n✗ Terminate entire workflow → kills recoverable work\n\nStructured errors let the coordinator make smart\nrecovery decisions — retry, modify query, or\nproceed with partial results and annotate gaps.`},
  ]
},
'1.3': {
  keyInsight: "Subagents DO NOT inherit parent context. The ONLY way to pass info is through the Task tool's prompt parameter. Everything must be explicit.",
  concepts: [
    {tag:'CODE',color:'var(--accent)',title:'AgentDefinition Structure',content:`interface AgentDefinition {\n  description: string;    // WHEN Claude should invoke this\n  prompt: string;         // System prompt (behavior)\n  tools?: string[];       // ONLY these tools available\n  disallowedTools?: string[];  // Block specific tools\n  model?: "sonnet" | "opus" | "haiku" | "inherit";\n  mcpServers?: AgentMcpServerSpec[];\n  maxTurns?: number;\n}\n\nEXAM-CRITICAL:\n• Coordinator's allowedTools MUST include "Task"\n• Subagents CANNOT spawn sub-subagents\n• If tools omitted → inherits ALL parent tools\n• If tools specified → ONLY those available\n• description tells Claude WHEN to invoke`},
    {tag:'EXAM',color:'var(--red)',title:'Context Passing — The #1 Gotcha',content:`WHAT SUBAGENTS GET AUTOMATICALLY:\n✓ Their own system prompt (AgentDefinition.prompt)\n✓ Project-level CLAUDE.md\n✓ Their allowed tool definitions\n\nWHAT SUBAGENTS DO NOT GET:\n✗ Parent's conversation history\n✗ Parent's system prompt\n✗ Results from other subagents\n✗ Files the parent has read\n✗ Errors from prior operations\n\nTHE ONLY CHANNEL: Task tool's prompt string\n\nGOOD: "Analyze /src/auth/jwt.ts. Prior search found\n  14 files import this. Bug in JIRA-456 relates to\n  token expiration on line 42."\n\nBAD: "Analyze the security issues." → No context!`},
    {tag:'PATTERN',color:'var(--green)',title:'Scoped Tool Access (Q9, Q13)',content:`Too many tools DEGRADES reliability:\n18 tools → confused selection\n4-5 tools → high accuracy\n\nRECOMMENDED SETS BY ROLE:\n• Read-only review: Read, Grep, Glob\n• Test runner: Bash, Read, Grep\n• Code modifier: Read, Edit, Write, Grep, Glob\n• Web researcher: WebSearch, WebFetch, Read\n• Synthesis: verify_fact (scoped tool)\n\nQ9: Synthesis needs fact verification.\n85% simple lookups, 15% complex.\n✓ Scoped verify_fact for 85% case\n✗ Full web search (violates least privilege)\n✗ Batch at end (blocks dependent steps)`},
    {tag:'PATTERN',color:'var(--yellow)',title:'Parallel Subagent Spawning',content:`PARALLEL (correct — reduces latency):\nCoordinator emits MULTIPLE Task calls\nin ONE response → all execute simultaneously\n\nSEQUENTIAL (when tasks have dependencies):\nTurn 1: Task("Search for AI topics")\nTurn 2: sees results → Task("Analyze top 5")\nTurn 3: sees analysis → Task("Synthesize")\n\nUp to 10 concurrent subagent tasks\nwith intelligent queuing in the Agent SDK.\n\nEXAM TIP: "How to reduce latency?" →\nParallel execution (multiple Task calls in\none response), not faster models.`},
  ]
},
'1.4': {
  keyInsight: "When failure has financial or security consequences → MUST use programmatic enforcement (hooks/prerequisites). Prompts are probabilistic and WILL fail.",
  concepts: [
    {tag:'EXAM',color:'var(--red)',title:'Programmatic vs Prompt-Based (Q1)',content:`THIS IS THE #1 MOST TESTED CONCEPT\n\nPROMPT-BASED (~70-90% compliance):\n  System prompt: "You MUST call get_customer first"\n  → Works most of the time\n  → WILL fail occasionally (the 12% in Q1)\n  → INSUFFICIENT for financial operations\n\nPROGRAMMATIC (100% compliance):\n  Hook/prerequisite BLOCKS process_refund until\n  get_customer returns verified ID.\n  → LLM literally CANNOT bypass it\n  → Executes at system level\n  → Required for financial/security ops\n\nDECISION RULE:\n• Identity verification → PROGRAMMATIC\n• Financial operations → PROGRAMMATIC\n• Refund processing → PROGRAMMATIC\n• Output formatting → Prompt-based OK\n• Tool ordering (soft) → Prompt-based OK`},
    {tag:'PATTERN',color:'var(--green)',title:'Structured Handoff Protocol',content:`When escalating to humans, handoff must be\nSELF-CONTAINED. Humans often DON'T have\nthe full conversation transcript.\n\nREQUIRED HANDOFF FIELDS:\n• customer_id\n• issue_summary\n• root_cause\n• refund_amount\n• recommended_action\n• conversation_context\n• prior_actions_taken\n• escalation_reason\n\nMULTI-CONCERN: Decompose into distinct items,\ninvestigate EACH in parallel, synthesize unified\nresolution. If any needs escalation, include ALL\nconcerns in the handoff.`},
    {tag:'EXAM',color:'var(--red)',title:'Escalation Calibration (Q3)',content:`SCENARIO: 55% resolution (target 80%).\nEscalates easy cases, handles complex ones.\n\n✓ A) Explicit escalation criteria + few-shot\n   examples → fixes unclear decision boundaries\n\n✗ B) Self-reported confidence score →\n   models are poorly calibrated\n✗ C) ML classifier on historical data →\n   over-engineered before prompt optimization\n✗ D) Sentiment analysis →\n   sentiment ≠ case complexity\n\nCORRECT ESCALATION TRIGGERS:\n• Customer explicitly requests human\n• Policy gap (ambiguous or silent)\n• Cannot make meaningful progress\n• Multiple customer matches\n\nPRINCIPLE: Try prompt optimization FIRST.\nOnly add ML infra after prompts exhausted.`},
  ]
},
'1.5': {
  keyInsight: "Hooks execute at SYSTEM level, outside the LLM reasoning chain. The model cannot skip them. Deterministic guarantees that prompts cannot provide.",
  concepts: [
    {tag:'ARCH',color:'var(--green)',title:'Hook Lifecycle & Types',content:`ALL HOOK TYPES IN THE SDK:\n• PreToolUse → Before tool execution\n• PostToolUse → After tool execution\n• PostToolUseFailure → After tool fails\n• Stop → Agent finishes (cleanup)\n• SessionStart / SessionEnd\n• UserPromptSubmit → User submits prompt\n• SubagentStart / SubagentStop\n• TaskCompleted → Subagent task done\n• PreCompact → Before context compaction\n• PermissionRequest\n• Notification\n\nPERMISSION PRIORITY: Deny > Ask > Allow\nIf ANY hook returns "deny", operation blocked.\n\nEVALUATION ORDER:\nhooks → deny rules → permission mode →\nallow rules → canUseTool callback`},
    {tag:'CODE',color:'var(--accent)',title:'PreToolUse — Compliance Enforcement',content:`// Block refunds over $500\nconst complianceHook = {\n  matcher: { toolNames: ["process_refund"] },\n  callback: async (input) => {\n    if (input.tool_input.amount > 500) {\n      return {\n        permissionDecision: "deny",\n        permissionDecisionReason:\n          "Refund exceeds $500 limit.",\n        additionalContext:\n          "Please use escalate_to_human."\n      };\n    }\n    return { permissionDecision: "allow" };\n  }\n};\n\nPreToolUse can:\n• Validate inputs\n• BLOCK the call (deny)\n• Modify inputs (updatedInput)\n• Redirect to another tool`},
    {tag:'CODE',color:'var(--accent)',title:'PostToolUse — Data Normalization',content:`// Normalize heterogeneous date formats\n// Tool A: Unix timestamp\n// Tool B: "March 15, 2024"\n// Tool C: "2024-03-15T00:00:00Z"\n// → Normalize ALL to ISO 8601\n\nconst normalizeDates = {\n  matcher: null,  // ALL tools\n  callback: async (input) => {\n    return {\n      additionalContext:\n        "Dates normalized to ISO 8601."\n    };\n  }\n};\n\nPostToolUse can:\n• Normalize output data\n• Append context\n• Log/audit\n• Trim verbose outputs\n• CANNOT undo execution`},
  ]
},
'1.6': {
  keyInsight: "Fixed pipelines (prompt chaining) for known steps. Dynamic decomposition when you don't know what you'll find. Split large reviews to avoid attention dilution.",
  concepts: [
    {tag:'ARCH',color:'var(--green)',title:'Chaining vs Dynamic Decomposition',content:`PROMPT CHAINING (Fixed Pipeline):\nStep 1 → Step 2 → Step 3 → Done\n• Steps known upfront, order fixed\n• Each step's output feeds next\n• Best for: predictable workflows\n• Examples: code review, data extraction\n\nDYNAMIC DECOMPOSITION (Adaptive):\nExplore → Discover → Adapt → Execute\n• Steps NOT known upfront\n• Plan evolves based on findings\n• Best for: open-ended investigation\n• Examples: legacy codebase, bug hunting\n\nDECISION RULE:\n"Predictable process" → Prompt chaining\n"Need to discover" → Dynamic\n"Large multi-file review" → Per-file + integration\n"Microservice restructuring" → Dynamic`},
    {tag:'EXAM',color:'var(--red)',title:'Multi-Pass Review — 14-File Problem (Q12)',content:`14-file PR review produces:\n• Detailed feedback early, superficial later\n• Obvious bugs missed in later files\n• Contradictory findings across files\n\nROOT CAUSE: Attention dilution\n("Lost in the middle" effect)\n\nSOLUTION:\nPASS 1: Per-file analysis (PARALLEL)\n  Each file gets FULL attention.\n\nPASS 2: Cross-file integration (SEQUENTIAL)\n  Check data flow, patterns, API contracts.\n\nWRONG ANSWERS:\n✗ "Split PRs" → shifts burden to devs\n✗ "Bigger context window" → DOESN'T fix\n  attention quality (capacity ≠ quality)\n✗ "3 passes, 2/3 consensus" → suppresses\n  real bugs caught intermittently`},
    {tag:'CONCEPT',color:'var(--yellow)',title:'Attention Dilution Research',content:`"Lost in the Middle" (Stanford/Liu et al.):\nLLMs attend best to START + END of context.\nPerformance drops 20+ points for middle content.\n\nU-shaped performance curve:\n  HIGH ████                      ████\n  MED  ████  ████          ████  ████\n  LOW  ████  ████  ████  ████  ████\n       Start     Middle       End\n\nMITIGATIONS:\n1. Split into focused passes\n2. Place key findings at START\n3. Use explicit section headers\n4. Trim verbose tool outputs\n5. Delegate exploration to subagents\n\n"Use bigger model/context" is almost\nALWAYS wrong on the exam.`},
  ]
},
'1.7': {
  keyInsight: "fork_session branches CONVERSATION HISTORY, not the filesystem. Stale context? Start fresh with summary injection.",
  concepts: [
    {tag:'CLI',color:'var(--cyan)',title:'Session Commands Reference',content:`CREATING:\n  claude                      # new unnamed\n  claude -n auth-refactor     # new named\n\nRESUMING:\n  claude --resume             # browse & select\n  claude --resume <name>      # by name\n  claude -c                   # continue most recent\n\nFORKING:\n  claude --resume <id> --fork-session\n  # Creates NEW session ID\n  # Copies conversation history\n  # Original UNCHANGED\n  # Both share SAME filesystem!\n\nNON-INTERACTIVE (CI/CD):\n  claude -p "prompt"          # print mode\n  claude -p "..." --output-format json\n  claude -p "..." --json-schema '{...}'`},
    {tag:'EXAM',color:'var(--red)',title:'Resume vs Fresh vs Fork',content:`RESUME when:\n✓ Prior context mostly still valid\n✓ Files haven't changed much\n✓ Continuing same investigation\n\nFRESH START when:\n✓ Prior tool results are stale\n✓ Context mostly irrelevant\n✓ Better: inject summary into new session\n✓ Context window consumed by old outputs\n\nFORK when:\n✓ Comparing alternative approaches\n✓ E.g., JWT vs OAuth from shared analysis\n✓ Want both branches accessible\n\nCRITICAL: fork ≠ git branch!\nfork_session branches CONVERSATION only.\nFilesystem is SHARED. Both see same files.\nIf fork edits a file, original sees it too.`},
    {tag:'PATTERN',color:'var(--yellow)',title:'Context Degradation Mitigation',content:`PROBLEM: After 30+ turns, Claude references\n"typical patterns" instead of specific class\nnames discovered earlier.\n\nSOLUTION (Q15):\n✓ Scratchpad files — persist key findings\n  OUTSIDE the context window. Immune to\n  degradation. Reference in subsequent prompts.\n\n✗ Bigger context → doesn't fix "lost in middle"\n✗ New session each phase → loses all prior work\n✗ /compact → helps space but doesn't preserve\n  specific findings\n\nALSO USEFUL:\n• /compact — compress context usage\n• /memory — view loaded config files\n• Explicit re-reading of key files`},
  ]
}
};

const SCENARIOS = [
{

function QuizView() {
  const [mode,setMode] = useState('setup');
  const [sectionFilter,setSectionFilter] = useState('all');
  const [questions,setQuestions] = useState([]);
  const [idx,setIdx] = useState(0);
  const [picked,setPicked] = useState(null);
  const [score,setScore] = useState(0);
  const [answered,setAnswered] = useState(0);
  const [answers,setAnswers] = useState([]);

  function startQuiz() {
    let qs = sectionFilter==='all' ? [...QUIZ_DATA] : QUIZ_DATA.filter(q=>q.section===sectionFilter);
    for(let i=qs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]];}
    setQuestions(qs);
    setIdx(0);setPicked(null);setScore(0);setAnswered(0);setAnswers([]);
    setMode('quiz');
  }

  if(mode==='setup') {
    const sections = ['all',...TASK_STATEMENTS.map(t=>t.id)];
    const counts = {};
    sections.forEach(s=>{counts[s]=s==='all'?QUIZ_DATA.length:QUIZ_DATA.filter(q=>q.section===s).length;});
    return React.createElement('div',{className:'fade-in'},
      React.createElement('h3',{style:{color:'var(--text)',fontSize:18,marginBottom:8,fontFamily:'var(--display)'}},'Exam Simulator'),
      React.createElement('p',{style:{color:'var(--textMid)',fontSize:13,marginBottom:20,lineHeight:1.6}},`${QUIZ_DATA.length} questions covering all 7 task statements. Filter by section or take the full exam.`),
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:6,marginBottom:20}},
        ...sections.map(s =>
          React.createElement('div',{key:s,onClick:()=>setSectionFilter(s),style:{padding:'10px 14px',background:sectionFilter===s?'var(--accentDim)':'var(--card)',border:`1px solid ${sectionFilter===s?'var(--accent)44':'var(--border)'}`,borderRadius:8,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            React.createElement('span',{style:{color:sectionFilter===s?'var(--accent2)':'var(--text)',fontWeight:500,fontSize:14}},s==='all'?'All Sections':`Section ${s}: ${TASK_STATEMENTS.find(t=>t.id===s)?.title||''}`),
            React.createElement(Tag,{color:counts[s]>0?'var(--cyan)':'var(--textDim)'},`${counts[s]} Q`)
          )
        )
      ),
      React.createElement('button',{onClick:startQuiz,disabled:counts[sectionFilter]===0,style:{padding:'12px 24px',background:counts[sectionFilter]>0?'var(--accent)':'var(--border)',color:'white',border:'none',borderRadius:8,fontSize:14,fontWeight:600,width:'100%'}},
        `Start Quiz (${counts[sectionFilter]} questions)`
      )
    );
  }

  if(mode==='review') {
    const bySection = {};
    answers.forEach(a=>{
      if(!bySection[a.section])bySection[a.section]={correct:0,total:0};
      bySection[a.section].total++;
      if(a.correct)bySection[a.section].correct++;
    });
    const pct = Math.round(score/questions.length*100);
    return React.createElement('div',{className:'fade-in'},
      React.createElement('div',{style:{textAlign:'center',marginBottom:24}},
        React.createElement('div',{style:{fontSize:56,marginBottom:8}},pct>=80?'🎯':pct>=60?'📊':'📚'),
        React.createElement('h2',{style:{color:'var(--text)',margin:'0 0 4px'}},`${score}/${questions.length} Correct (${pct}%)`),
        React.createElement('p',{style:{color:pct>=72?'var(--green)':'var(--red)',fontSize:14}},pct>=72?'Above passing threshold (72%)':'Below passing threshold (72%)')
      ),
      React.createElement('h4',{style:{color:'var(--textMid)',fontSize:13,marginBottom:10,fontFamily:'var(--mono)'}},'BREAKDOWN BY SECTION'),
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:8,marginBottom:20}},
        ...Object.entries(bySection).map(([sec,data]) => {
          const p = Math.round(data.correct/data.total*100);
          return React.createElement('div',{key:sec,style:{background:'var(--card)',borderRadius:8,padding:12,border:'1px solid var(--border)'}},
            React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
              React.createElement('span',{style:{color:'var(--text)',fontWeight:600,fontSize:13}},sec),
              React.createElement('span',{style:{color:p>=72?'var(--green)':'var(--red)',fontSize:13,fontWeight:600}},`${p}%`)
            ),
            React.createElement('div',{style:{height:4,background:'var(--border)',borderRadius:2}},
              React.createElement('div',{style:{height:'100%',width:`${p}%`,background:p>=72?'var(--green)':'var(--red)',borderRadius:2}})
            )
          );
        })
      ),
      React.createElement('div',{style:{display:'flex',gap:10}},
        React.createElement('button',{onClick:()=>setMode('setup'),style:{flex:1,padding:'10px 20px',background:'var(--card)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,fontWeight:600}},'New Quiz'),
        React.createElement('button',{onClick:startQuiz,style:{flex:1,padding:'10px 20px',background:'var(--accent)',color:'white',border:'none',borderRadius:8,fontWeight:600}},'Retry Same')
      )
    );
  }

  if(idx>=questions.length){setMode('review');return null;}
  const q = questions[idx];

  return React.createElement('div',{className:'fade-in'},
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      React.createElement('div',{style:{display:'flex',gap:8,alignItems:'center'}},
        React.createElement(Tag,{color:'var(--cyan)'},`Q${idx+1}/${questions.length}`),
        React.createElement(Tag,{color:'var(--accent)'},`Section ${q.section}`)
      ),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12}},
        React.createElement('span',{style:{color:'var(--green)',fontSize:13,fontWeight:600}},`${score}/${answered}`),
        React.createElement('button',{onClick:()=>setMode('setup'),style:{background:'none',border:'1px solid var(--border)',color:'var(--textDim)',borderRadius:6,padding:'4px 10px',fontSize:11}},'Exit')
      )
    ),
    React.createElement('div',{style:{height:3,background:'var(--border)',borderRadius:2,marginBottom:16}},
      React.createElement('div',{style:{height:'100%',width:`${((idx+(picked!==null?1:0))/questions.length)*100}%`,background:'linear-gradient(90deg,var(--accent),var(--green))',borderRadius:2,transition:'width .3s'}})
    ),
    React.createElement('p',{style:{color:'var(--text)',fontSize:14,lineHeight:1.65,marginBottom:16}},q.q),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8}},
      ...q.opts.map((opt,i) => {
        let bg='var(--card)',bdr='var(--border)';
        if(picked!==null){
          if(i===q.correct){bg='var(--greenDim)';bdr='var(--green)';}
          else if(i===picked){bg='var(--redDim)';bdr='var(--red)';}
        }
        return React.createElement('div',{key:i,onClick:()=>{if(picked!==null)return;setPicked(i);setAnswered(a=>a+1);if(i===q.correct)setScore(s=>s+1);setAnswers(a=>[...a,{section:q.section,correct:i===q.correct}]);},style:{padding:'12px 14px',background:bg,border:`1px solid ${bdr}`,borderRadius:8,cursor:picked===null?'pointer':'default',color:'var(--text)',fontSize:13,lineHeight:1.5,transition:'all .15s'}},
          React.createElement('span',{style:{color:'var(--textDim)',fontWeight:700,marginRight:8}},String.fromCharCode(65+i)+')'),opt
        );
      })
    ),
    picked!==null && React.createElement('div',{className:'fade-in',style:{marginTop:16}},
      React.createElement('div',{style:{background:'var(--accentDim)',border:'1px solid rgba(124,92,252,.2)',borderRadius:8,padding:14}},
        React.createElement('p',{style:{color:'var(--accent2)',fontWeight:700,margin:'0 0 4px',fontSize:11,fontFamily:'var(--mono)'}},'EXPLANATION'),
        React.createElement('p',{style:{color:'var(--textMid)',margin:0,fontSize:13,lineHeight:1.6}},q.why)
      ),
      React.createElement('button',{onClick:()=>{setIdx(i=>i+1);setPicked(null);},style:{marginTop:10,padding:'10px 20px',background:'var(--accent)',color:'white',border:'none',borderRadius:8,fontSize:13,fontWeight:600,width:'100%'}},
        idx<questions.length-1?'Next Question →':'See Results'
      )
    )
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════ */

function App() {
  const [view, setView] = useState('study');
  const [completed, setCompleted] = useState(() => {
    try { const s = localStorage.getItem('ccaf-d1-completed'); return s ? new Set(JSON.parse(s)) : new Set(); }
    catch { return new Set(); }
  });

  useEffect(() => {
    localStorage.setItem('ccaf-d1-completed', JSON.stringify([...completed]));
  }, [completed]);

  const toggleComplete = (id) => {
    setCompleted(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  return React.createElement('div',null,
    // Header
    React.createElement('div',{style:{marginBottom:20}},
      React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center',marginBottom:8,flexWrap:'wrap'}},
        React.createElement(Tag,{color:'var(--accent)'},'DOMAIN 1'),
        React.createElement(Tag,{color:'var(--red)'},'27% OF EXAM — HIGHEST WEIGHT'),
      ),
      React.createElement('h1',{style:{fontSize:28,margin:'8px 0 4px',fontWeight:800,fontFamily:'var(--display)',letterSpacing:'-0.02em',lineHeight:1.2}},'Agentic Architecture',React.createElement('br',null),React.createElement('span',{style:{color:'var(--accent2)'}},'& Orchestration')),
      React.createElement('p',{style:{color:'var(--textDim)',margin:0,fontSize:13}},'Claude Certified Architect — Foundations — Interactive Study Guide')
    ),

    // Navigation
    React.createElement('div',{style:{display:'flex',gap:4,marginBottom:24,overflowX:'auto',paddingBottom:4}},
      ...VIEWS.map(v =>
        React.createElement('button',{key:v,onClick:()=>setView(v),style:{padding:'8px 14px',background:view===v?'var(--accent)':'var(--card)',color:view===v?'white':'var(--textMid)',border:`1px solid ${view===v?'var(--accent)':'var(--border)'}`,borderRadius:8,fontSize:13,fontWeight:view===v?600:400,whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}},
          React.createElement(Icon,{d:VIEW_ICONS[v],size:16,color:view===v?'white':'var(--textDim)'}),
          VIEW_LABELS[v]
        )
      )
    ),

    // Views
    view==='study' && React.createElement(StudyView,{completed,onToggle:toggleComplete}),
    view==='scenarios' && React.createElement(ScenariosView),
    view==='decide' && React.createElement(DecisionView),
    view==='quiz' && React.createElement(QuizView),
    view==='reference' && React.createElement(ReferenceView),

    // Footer
    React.createElement('div',{style:{marginTop:48,paddingTop:12,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
      React.createElement('span',{style:{color:'var(--textDim)',fontSize:10}},'Domain 1 of 5 — CCA-F Study Guide'),
      React.createElement('span',{style:{color:'var(--textDim)',fontSize:10}},'Sources: Anthropic Docs, Agent SDK, MCP Spec, Building Effective Agents Blog')
    )
  );
}

createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
