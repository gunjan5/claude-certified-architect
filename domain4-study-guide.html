const SC={
'4.1':{keyInsight:"Explicit, specific criteria dramatically outperform vague instructions like 'be conservative' or 'only report high-confidence findings'. Define WHICH issues to report and WHICH to skip.",
  concepts:[
    {tag:'CORE',color:'var(--cyan)',title:'Explicit Criteria vs Vague Instructions',content:`BAD (vague — doesn't improve precision):\n"Be conservative and only report high-confidence findings"\n"Check that comments are accurate"\n\nGOOD (explicit — measurably better):\n"Flag comments ONLY when claimed behavior contradicts\nactual code behavior. Skip: style preferences,\nnaming opinions, minor formatting."\n\nDEFINE WHAT TO REPORT:\n✓ Bugs (logic errors, null pointer risks)\n✓ Security vulnerabilities (SQL injection, XSS)\n✓ Breaking API changes\n\nDEFINE WHAT TO SKIP:\n✗ Minor style issues\n✗ Local patterns (team preferences)\n✗ Naming conventions\n✗ Formatting inconsistencies\n\nWHY THIS MATTERS:\nHigh false positive rates in one category\nundermine trust in ALL categories.`},
    {tag:'EXAM',color:'var(--red)',title:'Severity Criteria with Code Examples',content:`EXPLICIT SEVERITY CRITERIA:\nDefine with concrete code examples for each level.\n\nCRITICAL: Causes data loss or security breach\n  Example: SQL injection via string concat:\n  query = f"SELECT * FROM users WHERE id={input}"\n\nHIGH: Breaks functionality in production\n  Example: Missing null check on required field:\n  user.name.toLowerCase() // user might be null\n\nMEDIUM: Potential issue in edge cases\n  Example: Race condition in concurrent access\n\nLOW: Code smell, no immediate impact\n  Example: Unused import\n\nFIXING FALSE POSITIVES:\n• Temporarily DISABLE high-FP categories\n  → Restores developer trust\n  → Improve prompts for those categories\n  → Re-enable when precision improves`},
  ]
},
'4.2':{keyInsight:"Few-shot examples are THE most effective technique for consistent output when instructions alone produce inconsistent results. Use 2-4 targeted examples that demonstrate ambiguous-case handling.",
  concepts:[
    {tag:'CORE',color:'var(--accent2)',title:'Few-Shot Prompting Patterns',content:`WHEN TO USE FEW-SHOT:\n• Detailed instructions produce inconsistent results\n• Ambiguous cases need demonstrated judgment\n• Specific output format required\n• Extraction from varied document structures\n• Reducing hallucination in extraction tasks\n\nHOW MANY EXAMPLES:\n• 2-4 targeted examples for ambiguous scenarios\n• Show reasoning for WHY one action was chosen\n  over plausible alternatives\n• Cover edge cases and varied formats\n\nSTRUCTURE:\n<examples>\n  <example>\n    <input>User asks: "check order 12345"</input>\n    <output>Tool: lookup_order (not get_customer)\n    Reasoning: Direct order reference → order tool</output>\n  </example>\n</examples>\n\nKEY: Examples enable GENERALIZATION to novel\npatterns, not just matching pre-specified cases.`},
    {tag:'PATTERN',color:'var(--green)',title:'Few-Shot for Extraction & Review',content:`EXTRACTION FROM VARIED DOCUMENTS:\nProvide examples showing handling of:\n• Inline citations vs bibliographies\n• Narrative descriptions vs structured tables\n• Methodology sections vs embedded details\n• Informal measurements vs precise values\n\nCODE REVIEW FEW-SHOT:\nDistinguish acceptable patterns from issues:\n\n<example>\n  <code>// Acceptable: team uses this pattern\n  const data = await fetch(url).then(r => r.json())\n  </code>\n  <finding>SKIP — established local pattern</finding>\n</example>\n\n<example>\n  <code>// Issue: no error handling on user input\n  const id = parseInt(req.params.id)\n  db.query("SELECT * FROM users WHERE id=" + id)\n  </code>\n  <finding>REPORT — SQL injection, severity: critical\n  Location: line 3, Suggested fix: use parameterized</finding>\n</example>\n\nReduces false positives while enabling generalization.`},
  ]
},
'4.3':{keyInsight:"tool_use with JSON schemas is THE most reliable approach for structured output. strict:true eliminates syntax errors entirely. Schema design: use nullable fields to prevent hallucination, enum+'other'+detail for extensibility.",
  concepts:[
    {tag:'CORE',color:'var(--accent)',title:'Two Approaches to Structured Output',content:`APPROACH 1: STRICT TOOL USE\ntools=[{\n  "name": "extract_data",\n  "strict": true,  // constrained decoding\n  "input_schema": {\n    "type": "object",\n    "properties": {\n      "name": {"type": "string"},\n      "score": {"type": "number"}\n    },\n    "required": ["name", "score"],\n    "additionalProperties": false\n  }\n}]\n→ Model CANNOT produce invalid JSON\n→ Eliminates retry logic for schema errors\n\nAPPROACH 2: JSON OUTPUT FORMAT\noutput_config={\n  "format": {\n    "type": "json_schema",\n    "schema": { ... }\n  }\n}\n→ Controls response format directly\n→ Can combine with tool use\n\nBOTH use constrained decoding.\nBOTH guarantee schema compliance.\nCan be used independently OR together.`},
    {tag:'EXAM',color:'var(--red)',title:'Schema Design — Critical Patterns',content:`NULLABLE FIELDS (prevent hallucination):\nWhen source may NOT contain the info:\n  "middle_name": {"type": ["string", "null"]}\n→ Model returns null instead of fabricating\n→ REQUIRED fields force fabrication!\n\nENUM + "OTHER" + DETAIL PATTERN:\n  "category": {\n    "enum": ["invoice", "receipt", "contract",\n             "other"]\n  },\n  "category_detail": {\n    "type": ["string", "null"],\n    "description": "If other, describe"\n  }\n→ Extensible categorization\n→ Captures unexpected types\n\n"UNCLEAR" ENUM VALUE:\n  "status": {"enum": ["active","inactive","unclear"]}\n→ For genuinely ambiguous cases\n\nadditionalProperties: false REQUIRED\non all objects for structured outputs.\n\nSTRICT ELIMINATES SYNTAX ERRORS\nbut NOT semantic errors (wrong values,\nline items not summing to total).`},
    {tag:'CODE',color:'var(--accent)',title:'tool_choice for Extraction',content:`FORCE SPECIFIC TOOL:\ntool_choice = {"type":"tool","name":"extract_metadata"}\n→ Guarantees this tool is called\n→ Use for structured output extraction\n→ Use to force first step before enrichment\n\nMULTIPLE SCHEMAS, UNKNOWN DOC TYPE:\ntool_choice = "any"\n→ Model MUST call a tool but picks which\n→ Use when you have extract_invoice,\n  extract_receipt, extract_contract\n  and don't know doc type\n\nAFTER EXTRACTION:\ntool_choice = "none" (or omit tools)\n→ Follow-up turns without tool calls\n→ Process the extracted data\n\nIMPORTANT LIMITATION:\nForced tool use ("any" or "tool") is\nINCOMPATIBLE with extended thinking mode.`},
  ]
},
'4.4':{keyInsight:"Retry-with-error-feedback: append specific validation errors to prompt on retry. BUT retries are USELESS when info is absent from source. Track detected_pattern to analyze false positive dismissals.",
  concepts:[
    {tag:'CORE',color:'var(--orange)',title:'Validation-Retry Pattern',content:`THE RETRY LOOP:\n1. Extract data using tool_use\n2. Validate with Pydantic / JSON Schema\n3. If validation fails:\n   → Append original doc + failed extraction\n     + SPECIFIC validation errors\n   → Retry (up to 3 attempts)\n4. If still fails: route to human review\n\nWHAT RETRIES CAN FIX:\n✓ Format mismatches (date formats)\n✓ Structural output errors (wrong nesting)\n✓ Type errors (string vs number)\n\nWHAT RETRIES CANNOT FIX:\n✗ Information absent from source document\n✗ Info exists in external doc not provided\n→ Retrying is WASTED effort here\n\nSTRICT MODE vs RETRIES:\nWith strict: true → schema syntax errors\nare IMPOSSIBLE. Retries only needed for\nSEMANTIC validation (business logic).`},
    {tag:'PATTERN',color:'var(--yellow)',title:'Self-Correction & Feedback Loops',content:`SELF-CORRECTION VALIDATION FLOW:\nExtract BOTH calculated and stated values:\n{\n  "stated_total": "$150.00",\n  "calculated_total": "$147.50",\n  "discrepancy_detected": true\n}\n→ Flag discrepancies for human review\n\nCONFLICT DETECTION:\n{\n  "source_a_value": "42%",\n  "source_b_value": "38%",\n  "conflict_detected": true\n}\n→ Preserve BOTH values with attribution\n\nFALSE POSITIVE TRACKING:\nAdd detected_pattern field to findings:\n{\n  "issue": "Unused variable",\n  "detected_pattern": "temporary_debug_var",\n  "severity": "low"\n}\n→ When devs dismiss findings, analyze which\n  detected_patterns are consistently dismissed\n→ Improve prompts for those patterns`},
  ]
},
'4.5':{keyInsight:"Message Batches API: 50% cost savings, up to 24h processing, no latency SLA. Use for overnight/weekly jobs. NOT for blocking pre-merge checks. custom_id matches requests to responses.",
  concepts:[
    {tag:'CORE',color:'var(--yellow)',title:'Message Batches API — Complete Reference',content:`KEY FACTS:\n• 50% cost savings (stacks with prompt caching)\n• Up to 100,000 requests per batch (or 256MB)\n• Processing: most < 1 hour, max 24 hours\n• Results available for 29 days\n• custom_id matches requests ↔ responses\n  (order NOT guaranteed)\n• Supports: tool use, vision, multi-turn\n• Does NOT support: multi-turn tool CALLING\n  within a single request\n\nAPPROPRIATE FOR:\n✓ Overnight technical debt reports\n✓ Weekly audit analysis\n✓ Nightly test generation\n✓ Bulk document processing\n\nNOT APPROPRIATE FOR:\n✗ Blocking pre-merge checks (no latency SLA)\n✗ Real-time user-facing responses\n✗ Interactive workflows`},
    {tag:'EXAM',color:'var(--red)',title:'Sample Q11 Pattern — Batch vs Real-Time',content:`SCENARIO: Two workflows:\n1. Blocking pre-merge check (devs wait)\n2. Overnight technical debt report\n\nProposal: Switch BOTH to batch API for 50% savings.\n\n✓ A) Batch for debt reports ONLY;\n  keep real-time for pre-merge\n  → Correct latency matching\n\n✗ B) Switch both to batch with polling\n  → Pre-merge can't tolerate 24h!\n✗ C) Keep both real-time\n  → Wastes 50% on latency-tolerant work\n✗ D) Both batch with timeout fallback\n  → Unnecessary complexity\n\nBATCH FAILURE HANDLING:\n• Resubmit only FAILED docs (by custom_id)\n• Modify failed docs (e.g., chunk oversized)\n• Refine prompts on SAMPLE before full batch\n  → Maximizes first-pass success rate`},
  ]
},
'4.6':{keyInsight:"Self-review is biased — same context retains reasoning. Use INDEPENDENT review instances (same model, fresh context). Multi-pass: per-file local analysis + cross-file integration to avoid attention dilution.",
  concepts:[
    {tag:'CORE',color:'var(--green)',title:'Self-Review Limitations',content:`WHY SELF-REVIEW FAILS:\n• Model retains reasoning context from generation\n• Less likely to question its OWN decisions\n• Defaults to self-validation, not adversarial review\n• Extended thinking doesn't fix this bias\n\nSOLUTION: INDEPENDENT INSTANCES\n• Same model, SEPARATE context window\n• No prior generation history\n• "One agent causes bugs, another finds them"\n\nRESULTS:\n• Substantive PR comments: 16% → 54%\n• <1% of findings marked incorrect\n\nVERIFICATION PASS:\nModel self-reports confidence per finding:\n{\n  "finding": "Null pointer risk on line 42",\n  "confidence": 0.92,\n  "reasoning": "user input never validated"\n}\n→ Route low-confidence to human review\n→ High-confidence findings auto-posted`},
    {tag:'PATTERN',color:'var(--cyan)',title:'Multi-Pass Review Architecture',content:`MULTI-PASS FOR LARGE PRs:\n\nPASS 1: Per-file analysis (PARALLEL)\n  • Each file gets dedicated context window\n  • Full attention — no dilution\n  • Multiple agents per file (logic, security)\n  • Result: per-file findings\n\nPASS 2: Cross-file integration (SEQUENTIAL)\n  • Aggregate per-file findings\n  • Check: interface contracts, data flow,\n    breaking changes, pattern consistency\n  • Result: integration findings\n\nPASS 3: Verification (FILTER)\n  • Review all findings for false positives\n  • Rank by severity\n  • Filter below threshold\n\nSCALING:\n• Small PRs → lightweight single pass\n• Large PRs (1000+ lines) → more agents\n  + deeper analysis per file\n• Each agent: isolated 200K token context\n\nATTENTION DILUTION:\n"Bigger context window" does NOT fix it.\nSplitting into focused passes DOES.`},
  ]
}
};
