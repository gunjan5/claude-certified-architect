const SECTION_CONTENT={
'2.1':{
  keyInsight:"Tool descriptions are THE primary mechanism LLMs use for tool selection. Minimal descriptions = unreliable selection. This is the single highest-leverage fix for tool misrouting.",
  concepts:[
    {tag:'CORE',color:'var(--accent)',title:'Tool Descriptions — The #1 Lever',content:`Tool descriptions are prompt-engineered text injected into\nthe context window. They are how the model decides WHICH\ntool to use for a given request.\n\nBAD DESCRIPTION (causes misrouting):\n  name: "get_customer"\n  description: "Retrieves customer information"\n\nGOOD DESCRIPTION:\n  name: "get_customer"\n  description: "Look up a customer's account profile by\n    email address or phone number. Returns name, account\n    ID, subscription tier, and billing status. Use this\n    BEFORE any order operations to verify customer identity.\n    Do NOT use for order lookups — use lookup_order instead."\n\nKEY PRINCIPLES (Anthropic's Engineering Blog):\n1. Include input formats it handles\n2. Include example queries / use cases\n3. Explain edge cases and boundaries\n4. State when to use it vs similar tools\n5. Tool name regex: ^[a-zA-Z0-9_-]{1,64}$`},
    {tag:'EXAM',color:'var(--red)',title:'Tool Misrouting — Sample Q2 Pattern',content:`SCENARIO: Agent calls get_customer when users ask\nabout orders ("check my order #12345").\nBoth tools have minimal descriptions.\n\nMOST EFFECTIVE FIRST STEP?\n✓ B) Expand tool descriptions with input formats,\n  examples, edge cases, boundaries\n  → Low-effort, high-leverage. Fixes root cause.\n\n✗ A) Few-shot examples → token overhead, doesn't\n  fix descriptions\n✗ C) Routing layer → over-engineered, bypasses\n  LLM understanding\n✗ D) Consolidate tools → valid but overkill as\n  first step\n\nPRINCIPLE: Fix tool descriptions FIRST.\nOnly add infrastructure after descriptions optimized.`},
    {tag:'PATTERN',color:'var(--accent2)',title:'Splitting vs Consolidating Tools',content:`SPLIT when:\n• A generic tool serves multiple unrelated purposes\n• Users can't tell which tool to pick\n• Tool does too many things poorly\n\nExample: analyze_document →\n  extract_data_points\n  summarize_content\n  verify_claim_against_source\n\nCONSOLIDATE when:\n• Multiple tools always called together\n• Individual tools are fine-grained API wrappers\n• Each unnecessary call adds 200-300ms + 1000+ tokens\n\nExample: get_customer_by_id + list_transactions\n  + list_notes → get_customer_context\n\nNAMING TO REDUCE AMBIGUITY:\n• Use meaningful namespacing:\n  asana_search, jira_search (not just "search")\n• Rename to eliminate overlap:\n  analyze_content → extract_web_results\n  analyze_document → summarize_pdf`},
    {tag:'PATTERN',color:'var(--yellow)',title:'System Prompt & Tool Selection',content:`System prompt wording can OVERRIDE tool descriptions!\n\nPROBLEM: Keyword-sensitive instructions create\nunintended tool associations.\n\nExample: System prompt says "always analyze content\nbefore responding" → agent calls analyze_content tool\neven when not relevant, because of keyword match.\n\nFIX: Review system prompts for keyword-sensitive\ninstructions that might override tool descriptions.\n\nTOOL DESCRIPTION BEST PRACTICES (Anthropic):\n• Challenge each piece: "Does this justify its\n  token cost?"\n• "Can I assume Claude knows this?"\n• Small refinements yield dramatic improvements\n• Anthropic: "More time optimizing tools than prompts\n  for SWE-bench"`},
  ]
},
'2.2':{
  keyInsight:"Structured error responses with error categories, retryable flags, and guidance enable intelligent recovery. Generic 'Operation failed' messages prevent the agent from making good decisions.",
  concepts:[
    {tag:'CORE',color:'var(--red)',title:'MCP isError Flag — How It Works',content:`The isError flag is returned in the JSON-RPC result\n(NOT as a protocol error). This distinction is critical:\n\n• Protocol errors → shown in UI notifications,\n  DISCARDED from context\n• isError: true → INJECTED into LLM's context window,\n  allowing model to understand failure and recover\n\nRETURN FORMAT:\n{\n  "content": [{\n    "type": "text",\n    "text": "Error: Customer not found for email..."\n  }],\n  "isError": true\n}\n\nIn the Claude API (not MCP), use tool_result:\n{\n  "type": "tool_result",\n  "tool_use_id": "toolu_01...",\n  "content": "Error: Customer not found",\n  "is_error": true\n}`},
    {tag:'EXAM',color:'var(--red)',title:'Error Categories — Know All Four',content:`FOUR ERROR CATEGORIES:\n\n1. TRANSIENT errors (retryable)\n   → timeouts, service unavailability, rate limits\n   → Agent should: retry with backoff\n\n2. VALIDATION errors (not retryable)\n   → invalid input format, missing required fields\n   → Agent should: fix input and retry\n\n3. BUSINESS errors (not retryable)\n   → policy violations, insufficient permissions\n   → Agent should: explain to user, don't retry\n\n4. PERMISSION errors (not retryable)\n   → unauthorized access, scope limitations\n   → Agent should: escalate or request auth\n\nSTRUCTURED ERROR RESPONSE:\n{\n  "errorCategory": "transient",\n  "isRetryable": true,\n  "description": "Database connection timed out",\n  "suggestedAction": "Retry in 5 seconds"\n}`},
    {tag:'PATTERN',color:'var(--accent2)',title:'Error Propagation in Multi-Agent',content:`LOCAL RECOVERY FIRST:\nSubagents should handle transient errors locally\n(retry with backoff) before propagating to coordinator.\n\nONLY ESCALATE:\n• Errors that cannot be resolved locally\n• Along with: partial results + what was attempted\n\nCRITICAL DISTINCTION:\n• Access failure (server down) → needs retry decision\n• Valid empty result (no matches) → successful query!\n  Return: {"results": [], "status": "success"}\n  NOT: {"isError": true, "message": "No results"}\n\nEMPTY ≠ ERROR:\nA search returning 0 results is a VALID response.\nDon't mark it as an error — that prevents recovery.\n\nGENERIC ERRORS ARE AN ANTI-PATTERN:\n✗ "Operation failed" → agent can't decide what to do\n✓ "Timeout after 30s querying orders DB. 3 of 5\n   records retrieved. Retry may complete." → actionable`},
  ]
},
'2.3':{
  keyInsight:"Too many tools degrades reliability. Restrict agents to 4-5 role-relevant tools. tool_choice has four modes: auto (default), any (must use a tool), tool (force specific), none (no tools).",
  concepts:[
    {tag:'CORE',color:'var(--purple)',title:'tool_choice Configuration — All 4 Modes',content:`tool_choice controls HOW the model uses tools:\n\n┌──────────────────┬──────────────────────────────────┐\n│ Mode             │ Behavior                         │\n├──────────────────┼──────────────────────────────────┤\n│ "auto" (default) │ Claude decides whether to use     │\n│                  │ tools or respond with text        │\n├──────────────────┼──────────────────────────────────┤\n│ "any"            │ MUST call at least one tool.      │\n│                  │ Claude picks which one.           │\n│                  │ Use: chatbots where every         │\n│                  │ response goes through a tool      │\n├──────────────────┼──────────────────────────────────┤\n│ {"type": "tool", │ MUST call THIS specific tool.     │\n│  "name": "..."}  │ Use: structured output extraction │\n│                  │ or forcing first step             │\n├──────────────────┼──────────────────────────────────┤\n│ "none"           │ Cannot use any tools.             │\n│                  │ Use: follow-up turns after        │\n│                  │ extraction                        │\n└──────────────────┴──────────────────────────────────┘\n\nEXAM TIP: "any" ≠ "auto".\n"any" = MUST use a tool. "auto" = MAY use a tool.`},
    {tag:'EXAM',color:'var(--red)',title:'Tool Distribution — The 18 vs 4-5 Problem',content:`PROBLEM: Agent has 18 tools available.\n→ Frequently selects wrong tools\n→ Uses tools outside its intended role\n→ Cross-specialization misuse\n\nSOLUTION: Restrict to 4-5 role-relevant tools.\n\nRECOMMENDED PER ROLE:\n• Read-only review: Read, Grep, Glob\n• Test runner: Bash, Read, Grep\n• Code modifier: Read, Edit, Write, Grep, Glob\n• Web researcher: WebSearch, WebFetch, Read\n• Synthesis: verify_fact (scoped)\n\nSCOPED CROSS-ROLE TOOLS:\nSometimes an agent needs LIMITED cross-role capability.\nExample: verify_fact for synthesis agent\n→ Handles 85% of needs (simple lookups)\n→ Complex 15% still routes through coordinator\n→ This IS least privilege\n\nREPLACING GENERIC TOOLS:\n✗ fetch_url (too broad, can fetch anything)\n✓ load_document (validates document URLs only)`},
    {tag:'CODE',color:'var(--purple)',title:'Forced Tool Selection Patterns',content:`PATTERN 1: Structured Output Extraction\n// Force a specific tool to guarantee schema output\ntool_choice = {"type": "tool", "name": "extract_sentiment"}\n// Claude MUST call this tool → you get structured JSON\n\nPATTERN 2: Enforce First Step\n// Force metadata extraction before enrichment\nTurn 1: tool_choice = {"type":"tool","name":"extract_metadata"}\nTurn 2: tool_choice = "auto"  // now enrichment tools\n\nPATTERN 3: Guarantee Tool Use\n// Chatbot must always use a tool (e.g., send_text)\ntool_choice = "any"\n// Claude picks which tool, but MUST pick one\n\nPATTERN 4: strict: true\n// Constrained decoding — model literally CANNOT\n// produce tokens violating your schema\ntool = {\n  "name": "analyze",\n  "input_schema": {...},\n  "strict": true  // eliminates retry logic entirely\n}`},
  ]
},
'2.4':{
  keyInsight:"MCP servers are configured at project-level (.mcp.json, shared via git) or user-level (~/.claude.json, personal). Environment variables for credentials. Tools from ALL configured servers available simultaneously.",
  concepts:[
    {tag:'CORE',color:'var(--cyan)',title:'MCP Server Configuration',content:`TWO CONFIGURATION SCOPES:\n\nPROJECT-LEVEL (.mcp.json in repo root):\n• Committed to git → shared with team\n• Team-wide tooling (Jira, GitHub, etc.)\n• Use env vars for credentials:\n{\n  "mcpServers": {\n    "github": {\n      "command": "npx",\n      "args": ["-y", "@mcp/github-server"],\n      "env": {\n        "GITHUB_TOKEN": "\${GITHUB_TOKEN}"\n      }\n    }\n  }\n}\n\nUSER-LEVEL (~/.claude.json):\n• NOT committed → personal only\n• Experimental/personal MCP servers\n• Available across all projects\n\nBOTH are available simultaneously.\nTools from ALL configured servers\nare discovered at connection time.`},
    {tag:'PATTERN',color:'var(--accent2)',title:'MCP Resources vs Tools',content:`MCP SERVERS EXPOSE THREE PRIMITIVES:\n\n1. TOOLS (model-controlled)\n   → Executable functions the MODEL calls\n   → Can have side effects (write DB, send email)\n   → Example: create_jira_ticket, search_docs\n\n2. RESOURCES (application-controlled)\n   → Read-only data the APP/CLIENT injects\n   → No side effects, deterministic\n   → Example: documentation catalog, DB schema\n\n3. PROMPTS (user-controlled)\n   → Templated interaction patterns\n   → Example: code review template\n\nWHEN TO USE RESOURCES:\n✓ Content catalogs (issue summaries, doc trees)\n✓ Reduce exploratory tool calls\n✓ Give agents visibility into available data\n✓ Background context injection\n\nWHEN TO USE TOOLS:\n✓ Actions that change state\n✓ Dynamic queries with parameters\n✓ Operations model should decide when to invoke`},
    {tag:'EXAM',color:'var(--red)',title:'MCP Best Practices',content:`COMMUNITY vs CUSTOM SERVERS:\n✓ Use existing community MCP servers for standard\n  integrations (Jira, GitHub, Slack)\n✗ Don't build custom servers for standard services\n✓ Reserve custom servers for team-specific workflows\n\nTOOL DESCRIPTION QUALITY:\n• Enhance MCP tool descriptions with detailed\n  capabilities and output explanations\n• Without good descriptions, agent may PREFER\n  built-in tools (like Grep) over more capable\n  MCP tools\n\nTRANSPORT TYPES:\n• stdio — local processes (most common)\n• HTTP — recommended for remote (new standard)\n• SSE — deprecated, don't use for new servers\n\nCLI COMMANDS:\n  claude mcp add --scope project myserver ...\n  claude mcp add --scope user myserver ...\n\nCRITICAL: env section must be at SAME level as\ncommand and args (not inside args).`},
  ]
},
'2.5':{
  keyInsight:"6 built-in tools: Grep (content search), Glob (file patterns), Read (full file), Write (new files), Edit (find-replace), Bash (shell). Start with Grep to find entry points, Read to follow flows.",
  concepts:[
    {tag:'CORE',color:'var(--orange)',title:'Built-in Tools — Complete Reference',content:`┌──────────┬─────────────────────────────────────┐\n│ Tool     │ Purpose                             │\n├──────────┼─────────────────────────────────────┤\n│ Grep     │ Search FILE CONTENTS for patterns    │\n│          │ (function names, errors, imports)    │\n│          │ Uses ripgrep under the hood          │\n├──────────┼─────────────────────────────────────┤\n│ Glob     │ Find FILES by name/path pattern     │\n│          │ (e.g., **/*.test.tsx)               │\n│          │ Sorted by modification time          │\n├──────────┼─────────────────────────────────────┤\n│ Read     │ Load full file contents              │\n│          │ Supports images, PDFs too            │\n├──────────┼─────────────────────────────────────┤\n│ Write    │ Create NEW files                     │\n│          │ Overwrites if exists                 │\n├──────────┼─────────────────────────────────────┤\n│ Edit     │ Targeted find-and-replace            │\n│          │ Requires UNIQUE text match           │\n│          │ Fails if match is non-unique         │\n├──────────┼─────────────────────────────────────┤\n│ Bash     │ Run shell commands                   │\n│          │ Persistent session (state preserved) │\n└──────────┴─────────────────────────────────────┘`},
    {tag:'EXAM',color:'var(--red)',title:'Grep vs Glob — The Key Distinction',content:`GREP = search CONTENTS of files\n  "Find all callers of processRefund()"\n  "Locate error messages containing 'timeout'"\n  "Find all import statements for auth module"\n\nGLOB = search FILE NAMES/PATHS\n  "Find all test files: **/*.test.tsx"\n  "Find all config files: **/config.*"\n  "Find all Python files in src/"\n\nEXAM TIP: When the question says "find files\nmatching a naming pattern" → Glob.\nWhen it says "search code for a function/error/\nimport" → Grep.\n\nEDIT FALLBACK PATTERN:\nWhen Edit fails (non-unique text match):\n1. Read the full file contents\n2. Modify in memory\n3. Write the entire file back\n→ This is the documented fallback.`},
    {tag:'PATTERN',color:'var(--yellow)',title:'Incremental Codebase Understanding',content:`DON'T read all files upfront. Build understanding\nincrementally:\n\n1. START with Grep\n   → Find entry points, function definitions\n   → grep "export function" across codebase\n\n2. THEN use Read\n   → Follow imports from entry points\n   → Trace data flow through modules\n\n3. TRACE function usage across wrappers:\n   → First: identify all exported names\n   → Then: grep for each name across codebase\n   → This catches re-exports and wrappers\n\nTOOL SEARCH (for large MCP tool sets):\nWhen 10+ MCP tools are available, use Tool Search\nwith defer_loading to dynamically discover 3-5\nrelevant tools per query.\n→ Reduces token usage by ~85%\n→ Avoids context window pollution`},
  ]
}
};
